<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dominexa Contact</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg,#0f2f26,#062018);
}

/* CARD */
.card {
  width: 90%;
  max-width: 1100px;
  margin: 80px auto;
  padding: 40px;
  border-radius: 25px;

  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(25px);
  border: 1px solid rgba(0,255,150,0.2);

  color: white;
}

/* NAV */
.nav {
  display: flex;
  justify-content: space-between;
  margin-bottom: 40px;
}

.menu span {
  margin-left: 20px;
  color: #aaa;
}

.menu a {
  text-decoration: none;
}
.menu a:hover span {
  color: #00ff9c;
}

/* CONTENT */
.content {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* LEFT */
.left h1 {
  font-size: 48px;
}

.subtitle {
  color: #00ff9c;
}

.form {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.form input {
  padding: 12px;
  border-radius: 30px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
}

.form button {
  padding: 12px 20px;
  border-radius: 30px;
  border: none;
  background: #00ff9c;
}

/* RIGHT */
.right {
  position: relative;
}

.right img {
  width: 450px;
  height: auto;
}

/* FLOAT ICONS */
.icon {
  position: absolute;
  font-size: 30px;
  animation: float 4s infinite;
}

.icon1 { top: 10px; left: 20px; }
.icon2 { top: 120px; right: 20px; }
.icon3 { bottom: 20px; left: 50px; }

@keyframes float {
  50% { transform: translateY(-20px); }
}

/* MOBILE */
@media(max-width:768px){
  .content {
    flex-direction: column;
    text-align: center;
  }
}


/* CTA CONTAINER */
.cta-buttons {
  position: fixed;
  right: 20px;
  bottom: 30px;
  display: flex;
  flex-direction: column;
  gap: 15px;
  z-index: 999;
}

/* BUTTON BASE */
.cta {
  width: 55px;
  height: 55px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;

  font-size: 22px;
  color: white;
  text-decoration: none;

  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(0,255,150,0.3);

  box-shadow: 0 0 15px rgba(0,255,150,0.2);

  transition: 0.3s;
}

/* WHATSAPP */
.cta.whatsapp {
  color: #25D366;
}

/* CALL */
.cta.call {
  color: #00ff9c;
}

/* HOVER EFFECT */
.cta:hover {
  transform: scale(1.15);
  box-shadow: 0 0 25px rgba(0,255,150,0.6);
}
</style>
</head>

<body>

<div class="card">

  <div class="nav">
    <h2>Dominexa</h2>
    <div class="menu">
      <a href="../index.html"><span>Home</span></a>
      <a href="services.html"><span>Services</span></a>
      <a href="about.html"><span>About</span></a>
      <a href="contact.html"><span>Contact</span></a>
    </div>
  </div>

  <div class="content">

    <div class="left">
      <h1>Contact Us</h1>
      <p class="subtitle">Digital Marketing Agency</p>

      <p>Hello there! 👋</p>
      <p>How can we help you today?</p>

      <div class="form">
        <input placeholder="Your Name">
        <input placeholder="Email">
        <button>Send</button>
      </div>
    </div>

    <div class="right">
      <img src="https://www.tesladigitalhq.com/wp-content/uploads/2021/07/Contact-us-illustration-1536x1062.png">

      <div class="icon icon1">💬</div>
      <div class="icon icon2">📧</div>
      <div class="icon icon3">📞</div>
    </div>

  </div>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<script>
gsap.from(".card", {scale:0.8, opacity:0, duration:1});
gsap.from(".left *", {y:40, opacity:0, stagger:0.2});
gsap.from(".right img", {x:100, opacity:0});
</script>
<div class="cta-buttons">

  <!-- WhatsApp -->
  <a href="https://wa.me/qr/M7XOBH2QKHM2F1" target="_blank" class="cta whatsapp">
    <i class="fab fa-whatsapp"></i>
  </a>

  <!-- Call -->
  <a href="tel:+917050474717" class="cta call">
    <i class="fas fa-phone"></i>
  </a>

</div>

</body>
</html>
